{% extends 'courses/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">
                    <i class="bi bi-box-arrow-in-right"></i> Авторизация
                </h2>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Логин</label>
                        <input type="text" name="username" id="id_username" 
                               class="form-control" placeholder="Введите логин" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Пароль</label>
                        <input type="password" name="password" id="id_password" 
                               class="form-control" placeholder="Введите пароль" required>
                    </div>
                    
                    <button type="submit" class="btn btn-dark w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Войти
                    </button>
                    
                    <p class="text-center mt-3 mb-0">
                        Ещё не зарегистрированы? 
                        <a href="{% url 'register' %}" class="text-dark fw-bold">Регистрация</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
